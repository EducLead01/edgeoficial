name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Overlay static files onto Next.js output
        run: |
          cp index.html out/index.html
          cp links.html out/links.html
          cp portifolio.html out/portifolio.html
          cp -r public/img out/img 2>/dev/null || true
          cp -r public/images out/images 2>/dev/null || true
          cp -r public/seo out/seo 2>/dev/null || true
          cp -r public/videos out/videos 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
